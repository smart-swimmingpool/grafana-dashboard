---
name: Lint Code Base

on:
  push:
    branches:
      - main
      - master
      - vibe/**
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mega-linter:
    name: MegaLinter
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v7.11.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
