# Markdown Lint Configuration for MegaLinter
# https://github.com/DavidAnson/markdownlint

---
# Default state for all rules
default: true

# MD004/ul-style - Unordered list style
MD004:
  style: dash

# MD007/ul-indent - Unordered list indentation
MD007:
  indent: 2
  start_indented: false

# MD013/line-length - Line length
MD013:
  line_length: 150
  code_blocks: false
  tables: false
  headings: false

# MD025/single-title/single-h1 - Only one top-level heading
MD025:
  front_matter_title: ""

# MD024/no-duplicate-heading - Multiple headings with the same content
MD024:
  siblings_only: true

# MD033/no-inline-html - Inline HTML
MD033:
  allowed_elements:
    - a
    - br
    - details
    - img
    - kbd
    - script
    - span
    - sub
    - sup
    - summary

# MD041/first-line-heading - First line in file should be a top level heading
MD041: false

# MD060/table-column-style - Table column style
MD060:
  style: around

# MD031/blanks-around-fences - Fenced code blocks should be surrounded by blank lines
MD031: false

# MD032/blanks-around-lists - Lists should be surrounded by blank lines
MD032: false

# MD040/fenced-code-language - Fenced code blocks should have a language specified
MD040: false

# MD046/code-block-style - Code block style
MD046:
  style: fenced
